<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>glgqqe</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,slnt,wdth,wght@8..144,0,25..151,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-icons-font@v13/font/simple-icons.min.css">
    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-secondary-container: #E8DEF8;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1C1B1F;
            --blob-1: #D0BCFF;
            --blob-2: #B0C4DE;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --md-sys-color-primary: #D0BCFF;
                --md-sys-color-on-primary: #381E72;
                --md-sys-color-primary-container: #4F378B;
                --md-sys-color-on-primary-container: #EADDFF;
                --md-sys-color-secondary-container: #4A4458;
                --md-sys-color-surface: #141218;
                --md-sys-color-on-surface: #E6E1E5;
                --blob-1: #4F378B;
                --blob-2: #2D334A;
            }
        }

        * { box-sizing: border-box; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        body {
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background-color: var(--md-sys-color-surface); font-family: 'Roboto Flex', sans-serif;
            color: var(--md-sys-color-on-surface); overflow: hidden;
        }

        .shapes-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: blur(60px); opacity: 0.6;
        }

        .shape { position: absolute; animation: morph 25s infinite alternate ease-in-out; }
        .shape-1 { width: 500px; height: 500px; background: var(--blob-1); top: -100px; right: -50px; }
        .shape-2 { width: 450px; height: 450px; background: var(--blob-2); bottom: -150px; left: -50px; animation-delay: -10s; }

        @keyframes morph {
            0% { border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%; transform: rotate(0deg) scale(1); }
            100% { border-radius: 70% 30% 50% 50% / 30% 60% 40% 70%; transform: rotate(180deg) scale(1.2); }
        }

        .container { width: 100%; max-width: 420px; padding: 32px; z-index: 1; }

        header { text-align: center; margin-bottom: 48px; }
        h1 {
            font-variation-settings: "wght" 1000, "wdth" 150;
            font-size: clamp(54px, 15vw, 84px);
            line-height: 0.85; margin: 0; color: var(--md-sys-color-primary);
            letter-spacing: -0.05em; cursor: default;
        }
        h1:hover { letter-spacing: 0.05em; font-variation-settings: "wght" 900, "wdth" 130; }

        .vibecoded {
            font-variation-settings: "wght" 600, "wdth" 100;
            font-size: 14px; margin-top: 16px; opacity: 0.5; letter-spacing: 0.4em; text-transform: uppercase;
        }

        .links-stack { display: flex; flex-direction: column; gap: 16px; }

        .link-card {
            display: flex; align-items: center; padding: 18px 28px; text-decoration: none;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border-radius: 100px; font-variation-settings: "wght" 600, "wdth" 100;
            font-size: 18px; position: relative; overflow: hidden;
        }

        .link-card i { font-size: 22px; margin-right: 18px; }

        .link-card:hover {
            transform: scale(1.04); background-color: var(--md-sys-color-surface);
            border: 2px solid var(--brand-color); color: var(--brand-color);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            font-variation-settings: "wght" 900, "wdth" 120;
            border-radius: 20px 40px 10px 40px;
        }

        /* Уникальные анимации иконок */
        /* Telegram - улетает */
        .tg:hover i { transform: translate(10px, -10px) scale(1.2); }
        
        /* GitHub - качается */
        .gh:hover i { animation: tilt 0.4s ease infinite alternate; }
        @keyframes tilt { from { transform: rotate(-15deg); } to { transform: rotate(15deg); } }

        /* Spotify - пульс */
        .sp:hover i { animation: spotify-pulse 0.6s infinite alternate ease-in-out; }
        @keyframes spotify-pulse { 
            from { transform: scale(1.1); filter: drop-shadow(0 0 2px var(--brand-color)); }
            to { transform: scale(1.4); filter: drop-shadow(0 0 8px var(--brand-color)); }
        }

        /* Steam - вращение */
        .st:hover i { transform: rotate(360deg); }

        /* Discord - прыжок */
        .ds:hover i { animation: bounce 0.5s ease infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

        /* Брендовые цвета */
        .tg { --brand-color: #26A5E4; }
        .gh { --brand-color: #181717; }
        .sp { --brand-color: #1DB954; }
        .st { --brand-color: #00ADEE; }
        .ds { --brand-color: #5865F2; }

        @media (prefers-color-scheme: dark) { .gh { --brand-color: #FFFFFF; } }

        footer { text-align: center; margin-top: 64px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="shapes-container">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>glgqqe</h1>
        </header>

        <nav class="links-stack">
            <a href="https://t.me/glgvvv" class="link-card tg" target="_blank">
                <i class="si si-telegram"></i><span>Telegram</span>
            </a>
            <a href="https://github.com/glgqqe" class="link-card gh" target="_blank">
                <i class="si si-github"></i><span>GitHub</span>
            </a>
            <a href="https://open.spotify.com/user/l49kd0b9986ihyz7fhkav7132?si=208e5e99a740463f" class="link-card sp" target="_blank">
                <i class="si si-spotify"></i><span>Spotify</span>
            </a>
            <a href="https://steamcommunity.com/id/glgqqe" class="link-card st" target="_blank">
                <i class="si si-steam"></i><span>Steam</span>
            </a>
            <a href="https://discord.gg/4faJyqv8" class="link-card ds" target="_blank">
                <i class="si si-discord"></i><span>Discord</span>
            </a>
        </nav>

   </div>
</body>
</html>
